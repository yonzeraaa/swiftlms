<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="32" height="32">
  <!-- Renaissance dark background -->
  <rect width="100" height="100" rx="14" fill="#1a1410"/>
  <!-- Subtle golden border -->
  <rect x="2" y="2" width="96" height="96" rx="12" fill="none" stroke="#8b6d22" stroke-width="1.5" opacity="0.5"/>
  <!-- SwiftMark bird/wing logo, scaled and centered in the square canvas.
       Original viewBox is 0 0 180 100; bird content spans x:14–166, y:25–75.
       Transform fits the 152×50 bird into 90×30 at center of 100×100 square. -->
  <g fill="#c9a84c" transform="translate(-3.3, 20.4) scale(0.592)">
    <path d="M88,48 C78,37 57,25 14,27 C36,25 66,38 86,48 Z"/>
    <path d="M88,48 C76,41 55,32 27,35 C46,32 68,41 86,48 Z" opacity="0.5"/>
    <path d="M92,48 C102,37 123,25 166,27 C144,25 114,38 94,48 Z"/>
    <path d="M92,48 C104,41 125,32 153,35 C134,32 112,41 94,48 Z" opacity="0.5"/>
    <ellipse cx="90" cy="47" rx="6" ry="3.5"/>
    <circle cx="90" cy="43" r="3"/>
    <!-- Tail feathers: stroke-width compensated for scale (2.5 / 0.592 ≈ 4.2) -->
    <path d="M87,50 C84,59 79,69 73,75" stroke="#c9a84c" stroke-width="4.2" fill="none" stroke-linecap="round"/>
    <path d="M93,50 C96,59 101,69 107,75" stroke="#c9a84c" stroke-width="4.2" fill="none" stroke-linecap="round"/>
  </g>
</svg>
